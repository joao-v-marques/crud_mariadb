spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/crud_mariadb
    username: root
    password: 1234
    driver-class-name: org.mariadb.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: validate

      show-sql: true

      properties:
        hibernate:
          format_sql: true

  application:
    name: crud-mariadb
